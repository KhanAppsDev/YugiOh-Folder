<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yu-Gi-Oh Binder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 10px;
  text-align: center;
  background: #f5f5f5;
}
.controls {
  margin-bottom: 10px;
}
.grid {
  display: grid;
  gap: 8px;
  justify-content: center;
}
.card {
  background: white;
  border: 2px solid #ccc;
  border-radius: 6px;
  padding: 5px;
}
.card input {
  width: 100%;
  box-sizing: border-box;
  margin-bottom: 5px;
}
.card img {
  width: 100%;
  aspect-ratio: 2.9 / 4;
  object-fit: cover;
  background: #eee;
}
button {
  margin: 5px;
}
</style>
</head>
<body>

<div class="controls">
  <select id="gridSize">
    <option value="2">2x2</option>
    <option value="3" selected>3x3</option>
    <option value="4">4x4</option>
  </select>
  <button onclick="prevPage()">Prev</button>
  <span id="pageIndicator"></span>
  <button onclick="nextPage()">Next</button>
  <button onclick="downloadPDF()">Download PDF</button>
</div>

<div id="grid" class="grid"></div>

<script>
const API = "https://db.ygoprodeck.com/api/v7/cardinfo.php?name=";

let state = JSON.parse(localStorage.getItem("binderState")) || {
  gridSize: 3,
  page: 0,
  pages: [[]]
};

const gridEl = document.getElementById("grid");
const gridSizeSelect = document.getElementById("gridSize");
const pageIndicator = document.getElementById("pageIndicator");

gridSizeSelect.value = state.gridSize;

function save() {
  localStorage.setItem("binderState", JSON.stringify(state));
}

function updateGrid() {
  const size = state.gridSize;
  gridEl.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
  gridEl.innerHTML = "";

  const total = size * size;
  if (!state.pages[state.page]) state.pages[state.page] = [];

  for (let i = 0; i < total; i++) {
    const cardData = state.pages[state.page][i] || { name: "", img: "" };

    const div = document.createElement("div");
    div.className = "card";

    const input = document.createElement("input");
    input.value = cardData.name;

    const img = document.createElement("img");
    img.src = cardData.img || "";

    input.addEventListener("keydown", async (e) => {
      if (e.key === "Enter") {
        const name = input.value.trim();
        if (!name) return;

        let cache = JSON.parse(localStorage.getItem("cardCache")) || {};
        if (cache[name]) {
          img.src = cache[name];
          saveCard(i, name, cache[name]);
          return;
        }

        try {
          const res = await fetch(API + encodeURIComponent(name));
          const data = await res.json();
          const url = data.data[0].card_images[0].image_url;

          cache[name] = url;
          localStorage.setItem("cardCache", JSON.stringify(cache));

          img.src = url;
          saveCard(i, name, url);
        } catch {
          alert("Card not found");
        }
      }
    });

    div.appendChild(input);
    div.appendChild(img);
    gridEl.appendChild(div);
  }

  pageIndicator.textContent = `Page ${state.page + 1} of ${state.pages.length}`;
  save();
}

function saveCard(index, name, img) {
  state.pages[state.page][index] = { name, img };
  save();
}

gridSizeSelect.addEventListener("change", () => {
  state.gridSize = parseInt(gridSizeSelect.value);
  updateGrid();
});

function nextPage() {
  state.page++;
  if (!state.pages[state.page]) state.pages[state.page] = [];
  updateGrid();
}

function prevPage() {
  if (state.page > 0) {
    state.page--;
    updateGrid();
  }
}

async function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  for (let p = 0; p < state.pages.length; p++) {
    state.page = p;
    updateGrid();
    await new Promise(r => setTimeout(r, 300));

    const canvas = await html2canvas(gridEl);
    const imgData = canvas.toDataURL("image/png");

    if (p > 0) pdf.addPage();
    pdf.addImage(imgData, "PNG", 10, 10, 190, 270);
  }

  pdf.save("binder.pdf");
}

updateGrid();
</script>

</body>
</html>
