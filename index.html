<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yu-Gi-Oh Binder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  text-align: center;
  margin: 0;
  padding: 10px;
}

.controls {
  margin-bottom: 10px;
}

button, select {
  padding: 8px;
  margin: 4px;
  font-size: 14px;
}

.grid {
  display: grid;
  gap: 10px;
  justify-content: center;
  margin: 10px auto;
}

.card {
  background: #222;
  border: 2px solid #555;
  border-radius: 8px;
  padding: 5px;
  width: 120px;
}

.card input {
  width: 100%;
  font-size: 12px;
  margin-bottom: 4px;
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-radius: 4px;
  background: #000;
}

.pagination {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="controls">
  <select id="gridSize">
    <option value="2">2x2</option>
    <option value="3" selected>3x3</option>
    <option value="4">4x4</option>
  </select>

  <button onclick="prevPage()">Prev</button>
  <span id="pageIndicator"></span>
  <button onclick="nextPage()">Next</button>

  <button onclick="downloadPDF()">Download PDF</button>
</div>

<div id="binder"></div>

<script>
const API = "https://db.ygoprodeck.com/api/v7/cardinfo.php?name=";

let state = JSON.parse(localStorage.getItem("binderState")) || {
  gridSize: 3,
  pages: [[...Array(9)].map(() => "")],
  currentPage: 0,
  cache: {}
};

document.getElementById("gridSize").value = state.gridSize;

function save() {
  localStorage.setItem("binderState", JSON.stringify(state));
}

function createGrid() {
  const size = state.gridSize;
  const container = document.getElementById("binder");
  container.innerHTML = "";

  const grid = document.createElement("div");
  grid.className = "grid";
  grid.style.gridTemplateColumns = `repeat(${size}, 120px)`;

  const slots = size * size;

  if (!state.pages[state.currentPage]) {
    state.pages[state.currentPage] = Array(slots).fill("");
  }

  for (let i = 0; i < slots; i++) {
    const cardName = state.pages[state.currentPage][i] || "";

    const card = document.createElement("div");
    card.className = "card";

    const input = document.createElement("input");
    input.value = cardName;

    const img = document.createElement("img");

    if (state.cache[cardName]) {
      img.src = state.cache[cardName];
    }

    input.addEventListener("change", async () => {
      const name = input.value.trim();
      state.pages[state.currentPage][i] = name;
      save();

      if (!name) {
        img.src = "";
        return;
      }

      if (state.cache[name]) {
        img.src = state.cache[name];
        return;
      }

      try {
        const res = await fetch(API + encodeURIComponent(name));
        const data = await res.json();

        const url = data.data[0].card_images[0].image_url;

        state.cache[name] = url;
        img.src = url;
        save();
      } catch {
        img.src = "";
      }
    });

    card.appendChild(input);
    card.appendChild(img);
    grid.appendChild(card);
  }

  container.appendChild(grid);
  updatePageIndicator();
}

function updatePageIndicator() {
  document.getElementById("pageIndicator").innerText =
    `Page ${state.currentPage + 1} of ${state.pages.length}`;
}

function nextPage() {
  state.currentPage++;
  if (!state.pages[state.currentPage]) {
    const size = state.gridSize * state.gridSize;
    state.pages[state.currentPage] = Array(size).fill("");
  }
  save();
  createGrid();
}

function prevPage() {
  if (state.currentPage > 0) {
    state.currentPage--;
    save();
    createGrid();
  }
}

document.getElementById("gridSize").addEventListener("change", (e) => {
  state.gridSize = parseInt(e.target.value);
  state.pages = [[...Array(state.gridSize * state.gridSize)].map(() => "")];
  state.currentPage = 0;
  save();
  createGrid();
});

async function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  for (let i = 0; i < state.pages.length; i++) {
    state.currentPage = i;
    createGrid();

    await new Promise(r => setTimeout(r, 300));

    const canvas = await html2canvas(document.getElementById("binder"));
    const imgData = canvas.toDataURL("image/png");

    if (i > 0) pdf.addPage();
    pdf.addImage(imgData, "PNG", 10, 10, 190, 270);
  }

  pdf.save("binder.pdf");
  save();
}

createGrid();
</script>

</body>
</html>
